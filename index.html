<!DOCTYPE html>
<html>
<body style="background:#0a0a0a; color:white; font-family:sans-serif; text-align:center; padding-top:50px;">
    <h2>Beacon Tracker</h2>
    <div id="dist" style="font-size:60px;">--.-m</div>
    <div id="status" style="color:#888; margin:20px;">Checking for FIELD-B1...</div>
    <button id="btn" style="padding:20px; border-radius:10px; background:#1D9E75; color:white; border:none; font-size:18px;">CONNECT BEACON</button>

    <script>
        const SERVICE_UUID = '0000180f-0000-1000-8000-00805f9b34fb'; // Battery Service

        document.getElementById('btn').onclick = async () => {
            const status = document.getElementById('status');
            const dist = document.getElementById('dist');
            
            try {
                status.innerText = "Requesting Bluetooth Device...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }],
                    optionalServices: [SERVICE_UUID]
                });

                status.innerText = "Target found: " + device.name;

                device.addEventListener('advertisementreceived', (e) => {
                    const d = Math.pow(10, ((-59) - e.rssi) / (10 * 2.0));
                    dist.innerText = d.toFixed(1) + "m";
                    status.innerText = "Signal: " + e.rssi + "dBm";
                });

                await device.watchAdvertisements();
                status.innerText = "Monitoring signal...";

            } catch (err) {
                status.innerText = "Error: " + err.message;
                console.error(err);
            }
        };
    </script>
</body>
</html>
