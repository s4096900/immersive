<!DOCTYPE html>
<html>
<body style="background:#0a0a0a; color:white; font-family:sans-serif; text-align:center; padding-top:100px;">
    <div style="font-size:12px; color:#555; letter-spacing:2px;">DISTANCE</div>
    <div id="dist" style="font-size:80px; font-weight:200; margin:20px;">--.-m</div>
    <div id="status" style="color:#1D9E75; margin-bottom:40px;">Ready to Scan</div>
    
    <button id="btn" style="padding:20px 50px; border-radius:50px; background:#1D9E75; color:white; border:none; font-size:18px; font-weight:bold; cursor:pointer;">FIND FIELD-B1</button>

    <script>
        // Filtering by the Battery Service UUID we put in the ESP32
        const TARGET_SERVICE = '0000180f-0000-1000-8000-00805f9b34fb';

        document.getElementById('btn').onclick = async () => {
            const status = document.getElementById('status');
            const distDisplay = document.getElementById('dist');
            
            try {
                status.innerText = "Requesting device list...";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [TARGET_SERVICE] }]
                });

                status.innerText = "Connected: " + device.name;

                // Listen for signal updates
                device.addEventListener('advertisementreceived', (event) => {
                    const rssi = event.rssi;
                    // Standard distance calculation: 10 ^ ((Measured Power - RSSI) / (10 * N))
                    const d = Math.pow(10, ((-59) - rssi) / (10 * 2.0));
                    distDisplay.innerText = d.toFixed(1) + "m";
                    status.innerText = "Signal: " + rssi + "dBm";
                });

                // Start watching the advertisements
                await device.watchAdvertisements();

            } catch (err) {
                status.innerText = "Error: " + err.message;
                status.style.color = "#D85A30";
            }
        };
    </script>
</body>
</html>
