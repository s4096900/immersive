<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Finder</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        #distance { font-size: 72px; font-weight: 200; margin: 10px 0; color: #534AB7; }
        #status { color: #888; font-size: 14px; margin-bottom: 20px; padding: 0 20px; }
        button { padding: 20px 40px; border-radius: 40px; border: none; background: #534AB7; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .info { font-size: 12px; color: #444; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="info">Estimated Distance</div>
    <div id="distance">--.-</div>
    <div id="status">Bluetooth must be active. Click below to scan for your ESP32.</div>
    
    <button id="connectBtn">SCAN FOR BEACON</button>

<script>
    let beaconDevice = null;

    async function startDiscovery() {
        const statusEl = document.getElementById('status');
        const distEl = document.getElementById('distance');

        try {
            statusEl.textContent = "Looking for devices...";
            
            // acceptAllDevices is the most reliable way to bypass Android filter bugs
            beaconDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['generic_access'] 
            });

            statusEl.textContent = "Monitoring: " + (beaconDevice.name || "Unknown Device");
            document.getElementById('connectBtn').textContent = "TAP TO RESET";

            beaconDevice.addEventListener('advertisementreceived', (event) => {
                const rssi = event.rssi;
                const dist = Math.pow(10, ((-59) - rssi) / (10 * 2.0));
                distEl.textContent = dist.toFixed(1) + "m";
                statusEl.textContent = "Last Signal: " + rssi + " dBm";
            });

            await beaconDevice.watchAdvertisements();

        } catch (error) {
            statusEl.textContent = "Error: " + error.message;
            console.error(error);
        }
    }

    document.getElementById('connectBtn').addEventListener('click', () => {
        if (beaconDevice) { window.location.reload(); }
        else { startDiscovery(); }
    });
</script>
</body>
</html>
